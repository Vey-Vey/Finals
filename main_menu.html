<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background-image: url('https://drive.google.com/thumbnail?id=1TbF1PshEh9Pj7c00NILZJh-SEkNkZfJc&sz=w1920');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      text-align: center;
      padding: 36px 20px 24px;
    }

    h1 {
      display: inline-block;
      font-family: 'Palatino Linotype', 'Book Antiqua', Palatino, cursive;
      font-size: 54px;
      color: white;
      text-shadow: 2px 3px 8px rgba(0,0,0,0.7);
      background-image: url('https://drive.google.com/thumbnail?id=1qx9iyENEJyHLEXdETN4p1GpGlaP0EIXo&sz=w600');
      background-size: cover;
      background-position: center;
      padding: 16px 80px;
      border-radius: 60px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.35);
      letter-spacing: 1px;
      font-style: italic;
    }

    .genre-grid {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 28px;
      padding: 40px 40px 60px;
      flex: 1;
      min-height: calc(100vh - 120px);
      align-items: center;
    }

    .genre-grid a { text-decoration: none; }

    .genre-card {
      position: relative;
      width: 260px;
      height: 400px;
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer;
      border: none;
      padding: 0;
      background: none;
      box-shadow: 0 8px 32px rgba(0,0,0,0.45);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .genre-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.5s ease, filter 0.3s ease;
    }

    .genre-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, rgba(0,0,0,0.1) 50%, transparent 100%);
      transition: background 0.3s ease;
    }

    .genre-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 16px 48px rgba(0,0,0,0.6);
    }

    .genre-card:hover img {
      transform: scale(1.08);
      filter: brightness(0.85);
    }

    .genre-card span {
      position: absolute;
      bottom: 22px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1;
      color: white;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-shadow: 1px 2px 6px rgba(0,0,0,0.8);
      white-space: nowrap;
    }

    footer {
      background: rgba(20, 20, 40, 0.85);
      backdrop-filter: blur(6px);
      color: #ccc;
      border-top: 1px solid rgba(255,255,255,0.12);
      display: flex;
      justify-content: center;
      gap: 80px;
      padding: 14px 40px;
      flex-wrap: wrap;
    }

    footer .col { font-size: 12px; line-height: 1.7; }

    footer .col strong {
      display: block;
      color: white;
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 2px;
      opacity: 0.6;
    }

    @media (max-width: 1024px) {
      h1 { font-size: 42px; padding: 14px 60px; }
      .genre-card { width: 220px; height: 340px; }
      .genre-card span { font-size: 18px; }
    }

    @media (max-width: 600px) {
      h1 { font-size: 30px; padding: 12px 32px; }
      header { padding: 24px 16px 16px; }
      .genre-grid {
        gap: 16px;
        padding: 20px 16px 40px;
        min-height: calc(100vh - 100px);
      }
      .genre-card { width: 150px; height: 240px; }
      .genre-card span { font-size: 14px; bottom: 14px; }
      footer { gap: 30px; padding: 14px 20px; }
    }
  </style>
</head>
<body>

  <header>
    <h1>NookBook</h1>
  </header>

  <div class="genre-grid">

    <a href="hor_genre.html">

        <span>Horror</span>

    <a href="fantasy_genre.html">

    </a>

    <a href="">

        <span>Fables</span>
      </button>

    <a href="">

        <span>Classics</span>

  </div>

</body>
</html>
